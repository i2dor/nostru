  <polygon points="38,21 59,21 111,107 90,107" fill="white"/>
  <rect x="90" y="21" width="21" height="86" rx="3" fill="white"/>

  <!-- Bitcoin orange badge, bottom-right -->
  <circle cx="97" cy="97" r="21" fill="#f97316"/>
  <!-- Lightning bolt inside badge -->
  <polygon points="100,83 93,97 99,97 92,113 106,97 100,97" fill="white"/>
